name: whisper
description: A security-focused chat application with auto-deleting messages.
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Networking
  dio: ^5.4.3+1
  web_socket_channel: ^3.0.1

  # Storage
  flutter_secure_storage: ^9.2.2

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  lucide_icons: ^0.257.0

  # Media
  image_picker: ^1.1.2
  file_picker: ^8.0.7
  record: ^5.1.2
  audioplayers: ^6.0.0
  path_provider: ^2.1.4

  # Firebase
  firebase_core: ^3.4.0
  firebase_messaging: ^15.1.0

  # Utilities
  url_launcher: ^6.2.6
  photo_view: ^0.15.0

  # Utils
  intl: ^0.19.0
  mime: ^1.0.6
  uuid: ^4.4.2
  equatable: ^2.0.5
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4
  collection: ^1.18.0
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  json_serializable: ^6.8.0
  freezed: ^2.5.7
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true

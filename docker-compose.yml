version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: whisper
      POSTGRES_USER: whisper
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-whisper}
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis}
    restart: unless-stopped

  backend:
    build: ./backend
    command: sh -c "sleep 5 && python manage.py migrate && python manage.py collectstatic --noinput && gunicorn whisper.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    env_file: .env
    volumes:
      - ./backend:/app
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      - db
      - redis
    restart: unless-stopped

  websocket:
    build: ./backend
    command: sh -c "sleep 10 && daphne -b 0.0.0.0 -p 8001 whisper.asgi:application"
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    restart: unless-stopped

  celery:
    build: ./backend
    command: sh -c "sleep 15 && celery -A whisper worker -l info"
    env_file: .env
    volumes:
      - ./backend:/app
      - media_data:/app/media
    depends_on:
      - db
      - redis
    restart: unless-stopped

  celery-beat:
    build: ./backend
    command: sh -c "sleep 15 && celery -A whisper beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler"
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - media_data:/var/www/media:ro
      - static_data:/var/www/static:ro
    depends_on:
      - backend
      - websocket
    restart: unless-stopped

volumes:
  postgres_data:
  media_data:
  static_data:

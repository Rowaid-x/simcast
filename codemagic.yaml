workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic2
    environment:
      flutter: 3.32.0
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.rowaidx.simcast
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: FE-simcast
          include: true
    scripts:
      - name: Install dependencies and generate iOS project
        script: |
          cd flutter_app
          flutter pub get
          # Stub out record_linux (not needed for iOS, v0.7.2 has compilation errors)
          # Must keep RecordLinux class with registerWith() since dart_plugin_registrant.dart references it
          RECORD_LINUX=$(find $HOME/.pub-cache/hosted/pub.dev -maxdepth 1 -name "record_linux-*" -type d | head -1)
          if [ -n "$RECORD_LINUX" ]; then
            cat > "$RECORD_LINUX/lib/record_linux.dart" << 'STUB'
          class RecordLinux {
            static void registerWith() {}
          }
          STUB
            echo "Stubbed record_linux at $RECORD_LINUX"
          fi
          flutter create --platforms ios .
      - name: Set bundle ID and iOS deployment target
        script: |
          cd flutter_app/ios
          # Fix bundle ID (flutter create resets it to com.example.*)
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = .*/PRODUCT_BUNDLE_IDENTIFIER = com.rowaidx.simcast;/g' Runner.xcodeproj/project.pbxproj
          # Disable automatic signing (prevents conflict with Codemagic's app_store signing)
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' Runner.xcodeproj/project.pbxproj
          # Set deployment target
          sed -i '' '/^platform :ios/d' Podfile
          sed -i '' '1s/^/platform :ios, '\''15.0'\''\n/' Podfile
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = .*/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g' Runner.xcodeproj/project.pbxproj
          # Verify
          grep "PRODUCT_BUNDLE_IDENTIFIER" Runner.xcodeproj/project.pbxproj | head -3
          grep "CODE_SIGN_STYLE" Runner.xcodeproj/project.pbxproj | head -3
      - name: Install CocoaPods
        script: |
          cd flutter_app/ios && pod install
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Build iOS
        script: |
          cd flutter_app && flutter build ipa --release --verbose \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - flutter_app/build/ios/ipa/*.ipa
      - flutter_app/build/ios/archive/*.xcarchive
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - rowaid.mh@gmail.com
        notify:
          success: true
          failure: true
